<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Community Event Portal</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section class="form-section">

    <h2>Event Registration</h2>

    <form id="registrationForm">

        <input
            type="text"
            name="username"
            placeholder="Enter your name"
        >

        <input
            type="email"
            name="email"
            placeholder="Enter your email"
        >

        <select name="selectedEvent">

            <option value="">
                Select Event
            </option>

            <option value="Music Night">
                Music Night
            </option>

            <option value="Baking Workshop">
                Baking Workshop
            </option>

            <option value="Football Match">
                Football Match
            </option>

        </select>

        <button type="submit">
            Submit
        </button>

    </form>

    <p id="formMessage"></p>

</section>
    <header>
        <h1>Local Community Event Portal</h1>
        <p>Find and register for upcoming community events</p>
    </header>

    <section class="controls">

        <select id="categoryFilter">
            <option value="all">All Categories</option>
            <option value="Music">Music</option>
            <option value="Workshop">Workshop</option>
            <option value="Sports">Sports</option>
        </select>

        <input 
            type="text" 
            id="searchInput" 
            placeholder="Search events..."
        >

    </section>

    <section id="eventContainer">

    </section>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="main.js"></script>

    <script src="js/basics.js"></script>
    <script src="js/events.js"></script>
    <script src="js/dom.js"></script>
    <script src="js/async.js"></script>
    <script src="js/forms.js"></script>
    <script src="js/jquery.js"></script>

</body>
</html>
